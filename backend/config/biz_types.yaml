# 通用预警规则（跨业态）
alert_rules:
  red:
    - id: "R001"
      name: "营业额低于盈亏平衡点"
      indicator: "daily_revenue"
      condition: "value < breakeven_point"
      response_time: "2h"
    - id: "R002"
      name: "毛利率低于45%"
      indicator: "gross_margin"
      condition: "value < 0.45"
      response_time: "2h"
    - id: "R003"
      name: "人力成本占比超过30%"
      indicator: "labor_cost_rate"
      condition: "value > 0.30"
      response_time: "2h"
    - id: "R004"
      name: "租金成本占比超过20%"
      indicator: "rent_cost_rate"
      condition: "value > 0.20"
      response_time: "2h"
    - id: "R005"
      name: "净利润率低于10%持续3月"
      indicator: "net_margin"
      condition: "value < 0.10 and consecutive_months >= 3"
      response_time: "2h"
    - id: "R006"
      name: "客流同比下降超30%"
      indicator: "tc_yoy_change"
      condition: "value < -0.30"
      response_time: "2h"
    - id: "R007"
      name: "翻台率全天低于1.5次"
      indicator: "turnover_rate"
      condition: "value < 1.5"
      response_time: "2h"

  yellow:
    - id: "Y001"
      name: "营业额安全边际不足"
      indicator: "daily_revenue"
      condition: "breakeven_point <= value < breakeven_point * 1.2"
      response_time: "当日"
    - id: "Y002"
      name: "人力成本占比20%-25%"
      indicator: "labor_cost_rate"
      condition: "0.20 <= value <= 0.25"
      response_time: "当日"
    - id: "Y003"
      name: "租金成本占比15%-20%"
      indicator: "rent_cost_rate"
      condition: "0.15 <= value <= 0.20"
      response_time: "当日"
    - id: "Y004"
      name: "食材成本率连续3期上涨"
      indicator: "food_cost_rate"
      condition: "consecutive_rise >= 3"
      response_time: "当日"
    - id: "Y005"
      name: "客单价连续2月下滑5%-10%"
      indicator: "ac"
      condition: "consecutive_decline_months >= 2 and decline_pct >= 0.05"
      response_time: "当日"
    - id: "Y006"
      name: "毛利率45%-50%"
      indicator: "gross_margin"
      condition: "0.45 <= value < 0.50"
      response_time: "当日"
    - id: "Y007"
      name: "出餐超时率5%-10%"
      indicator: "overtime_rate"
      condition: "0.05 <= value <= 0.10"
      response_time: "当日"
    - id: "Y008"
      name: "同店增长率-5%~0%"
      indicator: "sssg"
      condition: "-0.05 <= value < 0"
      response_time: "当日"

# 单店模型六大保命条件
survival_conditions:
  - id: "S001"
    name: "悲观性营业额预估"
    rule: "采用70/80原则预估"
    check: "actual_revenue >= pessimistic_revenue"
  - id: "S002"
    name: "菜单综合毛利率"
    rule: "≥65%"
    check: "menu_gross_margin >= 0.65"
  - id: "S003"
    name: "租金占比"
    rule: "<15%"
    check: "rent_cost_rate < 0.15"
  - id: "S004"
    name: "人均产值"
    rule: "人力成本占比<20%"
    check: "labor_cost_rate < 0.20"
  - id: "S005"
    name: "半变动成本占比"
    rule: "<6%"
    check: "semi_variable_cost_rate < 0.06"
  - id: "S006"
    name: "综合平米投入"
    rule: "<0.5万元/㎡"
    check: "investment_per_sqm < 5000"
